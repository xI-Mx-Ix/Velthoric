name: "❓ Question"
description: "Ask something about the mod or how to use it."
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: "What would you like to know?"
      placeholder: "Ask your question here..."
    validations:
      required: true
  - type: checkboxes
    id: commitment
    attributes:
      label: "Follow-up Commitment"
      options:
        - label: "I will keep an eye on this issue and respond to follow-up questions."
          required: true