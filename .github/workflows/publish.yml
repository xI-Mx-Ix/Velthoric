# Release Publish Pipeline
#
# Triggered manually via workflow_dispatch. This pipeline builds native libraries
# for all supported platforms, assembles the final mod JARs, runs the full GameTest
# suite, and only if all tests pass publishes the release to CurseForge,
# Modrinth, GitHub Releases, and the Cloudsmith Maven repository.
#
# Pipeline stages:
#   1. build-natives  - Compile vx-native for all platforms in parallel.
#   2. build-mod      - Assemble Fabric & NeoForge JARs using the compiled natives.
#   3. gametests      - Run the automated GameTest server for both loaders.
#   4. publish        - Publish to all distribution platforms (gated on test success).

name: "Publish Release"

on:
  workflow_dispatch:

jobs:
  # Stage 1: Native Libraries
  build-natives:
    name: "Stage 1 - Build Natives"
    uses: ./.github/workflows/_reusable-build-natives.yml

  # Stage 2: Mod Assembly
  build-mod:
    name: "Stage 2 - Build Mod"
    needs: build-natives
    uses: ./.github/workflows/_reusable-build-mod.yml
    with:
      natives-artifact-prefix: "velthoric-natives-${{ github.run_id }}"
      retention-days: 7

  # Stage 3: Automated Tests
  # Publishing is blocked entirely if any GameTest fails.
  gametests:
    name: "Stage 3 - GameTests"
    needs: build-mod
    uses: ./.github/workflows/_reusable-gametests.yml
    with:
      natives-artifact-prefix: "velthoric-natives-${{ github.run_id }}"

  # Stage 4: Multi-Platform Publish
  # This job only runs after all GameTests have passed successfully.
  publish:
    name: "Stage 4 - Publish to All Platforms"
    needs: gametests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Java 21 (Temurin)"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Download all per-platform natives and place them in the prebuilt-natives
      # directory so the Gradle build can skip the CMake compilation step.
      - name: "Download Compiled Natives"
        uses: actions/download-artifact@v4
        with:
          pattern: "velthoric-natives-${{ github.run_id }}-*"
          path: vx-native/prebuilt-natives
          merge-multiple: true

      - name: "Grant Gradle Wrapper Execute Permission"
        run: chmod +x gradlew

      # Runs the full Velthoric publishing pipeline via the custom buildSrc plugin.
      # The plugin automatically configures CurseForge, Modrinth, GitHub Releases,
      # and the Cloudsmith Maven repository based on the provided credentials.
      - name: "Publish to All Platforms"
        run: ./gradlew build publishVelthoric -x :vx-native:cmakeBuild
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}